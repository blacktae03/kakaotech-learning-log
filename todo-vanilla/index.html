<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 헤더: 앱 타이틀 + 날짜 네비게이션 -->
      <header class="header">
        <h1 class="app-title">Todo</h1>
        <div class="date-nav">
          <button class="date-btn" id="prevDate">&#8592;</button>
          <span class="current-date" id="currentDateDisplay"></span>
          <button class="date-btn" id="nextDate">&#8594;</button>
        </div>
      </header>

      <!-- Todo 입력 영역 -->
      <div class="input-section">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="할 일을 입력하세요..."
        />
        <button id="addBtn" class="add-btn">추가</button>
      </div>
      <p class="error-msg" id="errorMsg"></p>

      <!-- 상태 필터 탭 -->
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">전체</button>
        <button class="tab" data-filter="active">진행 중</button>
        <button class="tab" data-filter="completed">완료</button>
      </div>

      <!-- Todo 목록 -->
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <script src="app.js"></script>
  </body>
</html>
